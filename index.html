<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoS TEAM — Başarı Tablosu</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{background:#0a1128;color:#fff;font-family:'Public Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.ms{font-family:'Material Symbols Outlined',sans-serif;font-size:16px;font-variation-settings:'FILL' 1;display:inline-block;vertical-align:middle;line-height:1}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,17,40,0.97);border-bottom:1px solid #304724;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{color:#ec5b13;width:26px;height:26px;flex-shrink:0}
.logo h2{font-size:14px;font-weight:900;text-transform:uppercase;letter-spacing:-0.04em}
.hdr-r{display:flex;align-items:center;gap:10px}
.upd-box{text-align:right}
.upd-lbl{font-size:9px;color:#a5c893;text-transform:uppercase;font-weight:700;letter-spacing:0.08em}
.upd-val{font-size:11px;font-family:monospace}
.btn{background:#304724;border:none;color:#fff;padding:7px 13px;border-radius:10px;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.btn:hover{background:#3d5a2d}
.btn:disabled{opacity:.5;cursor:default}
.btn-primary{background:#ec5b13}
.btn-primary:hover{background:#d44f0f}
.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:16px 20px 80px;display:flex;flex-direction:column;gap:14px;max-width:1600px;margin:0 auto}
.status-bar{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:10px 16px;font-size:11px;color:#a5c893;display:flex;align-items:center;gap:8px}
.sdot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sdot.loading{background:#facc15;animation:pulse 1s infinite}
.sdot.error{background:#f87171}
.countdown{margin-left:auto;font-family:monospace;font-size:10px;color:#64748b}
.hero{background:#111d3a;border:1px solid #304724;border-radius:20px;padding:24px;display:flex;gap:24px;align-items:center;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:0;right:0;width:50%;height:100%;background:radial-gradient(circle at 70% 50%,rgba(236,91,19,.1) 0%,transparent 70%);pointer-events:none}
.av-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}
.av-ring{width:100px;height:100px;border-radius:50%;border:3px solid #ec5b13;padding:3px}
.av-img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.av-init{width:100%;height:100%;border-radius:50%;background:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#ec5b13}
.av-badge{background:#ec5b13;color:#fff;font-size:8px;font-weight:700;padding:3px 12px;border-radius:20px;white-space:nowrap;text-align:center;line-height:1.6}
.hero-info{flex:1;position:relative;z-index:1}
.hero-info h1{font-size:26px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px}
.hero-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{background:#304724;color:#a5c893;font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px}
.tag.orange{background:rgba(236,91,19,.2);color:#ec5b13}
.hero-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px}
.stat-mini{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px}
.stat-mini .sl{font-size:9px;color:#94a3b8;margin-bottom:3px}
.stat-mini .sv{font-size:20px;font-weight:900}
.hero-deco{opacity:.18;text-align:right;flex-shrink:0;position:relative;z-index:1}
.hero-deco .dt{font-size:40px;font-weight:900;color:#ec5b13;font-style:italic;line-height:1}
.hero-deco .ds{font-size:9px;color:#a5c893;font-weight:700;letter-spacing:.1em;margin-top:4px}
.legend-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.leg-card{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.leg-card.acc{background:#304724;border-color:#ec5b13}
.leg-ico{background:rgba(236,91,19,.2);color:#ec5b13;padding:8px;border-radius:8px;display:flex;font-size:18px}
.leg-ico.wh{background:rgba(255,255,255,.2)}
.leg-lbl{font-size:10px;color:#94a3b8}
.leg-card.acc .leg-lbl{color:#a5c893}
.leg-pts{font-size:13px;font-weight:700}
.team-progress-section{display:flex;flex-direction:column;gap:8px}
.team-progress-row{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:12px 16px}
.tpr-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tpr-score{font-size:24px;font-weight:900;color:#ec5b13;font-family:monospace;margin-right:12px;flex-shrink:0}
.tpr-name{font-size:13px;font-weight:900}
.tpr-meta{font-size:10px;color:#a5c893;margin-top:2px}
.tpr-bar-wrap{width:100%;background:rgba(255,255,255,.07);height:8px;border-radius:99px;overflow:hidden}
.tpr-bar-fill{height:100%;background:#ec5b13;border-radius:99px;transition:width .6s ease}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.team-sec .th{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.team-ac{width:4px;height:28px;background:#ec5b13;border-radius:2px;flex-shrink:0}
.team-sec h3{font-size:16px;font-weight:900;margin:0}
.team-avg{font-family:monospace;font-size:11px;color:#a5c893;margin-left:auto}
.tbl-wrap{border:1px solid #304724;border-radius:14px;overflow:hidden;background:rgba(26,42,74,.4)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:rgba(48,71,36,.5)}
th{padding:9px 10px;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#a5c893;font-weight:700;text-align:left}
th:last-child{text-align:right}
td{padding:9px 10px;border-top:1px solid rgba(255,255,255,.05);vertical-align:middle}
td:last-child{text-align:right}
.nc{display:flex;align-items:center;gap:7px}
.avsm{width:30px;height:30px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.nm{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pval{font-family:monospace;font-size:13px;font-weight:900}
.pno{color:#64748b;font-weight:700;font-family:monospace;font-size:11px}
.bdg{font-size:8px;font-weight:700;padding:3px 7px;border-radius:20px;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.2);color:#4ade80}
.bg-y{background:rgba(234,179,8,.2);color:#facc15}
.bg-r{background:rgba(239,68,68,.2);color:#f87171}
.lights{display:flex;gap:3px;align-items:center}
.light{width:12px;height:12px;border-radius:50%;background:#1e293b;border:1px solid rgba(255,255,255,.1);flex-shrink:0}
.light.on{background:#ec5b13;border-color:transparent;box-shadow:0 0 6px rgba(236,91,19,.8)}
.light-lbl{font-size:8px;color:#64748b;margin-left:4px;font-family:monospace}
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ch-card{background:#111d3a;border:1px solid #304724;border-radius:14px;padding:16px}
.ch-card.grn{background:linear-gradient(135deg,#304724 0%,#1a2a4a 100%);border-color:#ec5b13;text-align:center;display:flex;flex-direction:column;justify-content:center}
.ch-title{font-size:9px;color:#a5c893;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.dist-row{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:4px}
.dist-bw{width:100%;background:rgba(255,255,255,.06);height:6px;border-radius:99px;overflow:hidden;margin-bottom:8px}
.dist-bf{height:100%;border-radius:99px}
.tot-num{font-size:42px;font-weight:900;line-height:1}
.tot-sub{font-size:11px;color:#a5c893;margin-top:6px}
.tot-bar{background:rgba(0,0,0,.3);border-radius:99px;height:6px;margin-top:12px;overflow:hidden}
.tot-fill{height:100%;background:#fff;border-radius:99px;transition:width .6s ease}
.ticker-wrap{position:fixed;bottom:0;left:0;width:100%;height:46px;background:rgba(10,17,40,.98);border-top:1px solid #304724;overflow:hidden;display:flex;align-items:center;z-index:100}
.ticker{display:inline-block;white-space:nowrap;padding-right:100%;animation:tick 40s linear infinite;font-size:11px;font-weight:700}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-100%)}}
.ti{display:inline-flex;align-items:center;gap:6px;margin-right:48px}
.tor{color:#ec5b13}
.tgr{color:#a5c893}
@media(max-width:960px){.teams-grid{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}.legend-grid{grid-template-columns:repeat(2,1fr)}.hero{flex-direction:column;text-align:center}.hero-tags{justify-content:center}.hero-stats{margin:0 auto}.hero-deco{display:none}}
@media(max-width:500px){.main{padding:12px 12px 80px}.hero-info h1{font-size:20px}.legend-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 48 48" fill="none">
      <path d="M24 4C25.78 14.22 33.78 22.22 44 24C33.78 25.78 25.78 33.78 24 44C22.22 33.78 14.22 25.78 4 24C14.22 22.18 22.22 14.22 24 4Z" fill="currentColor"/>
    </svg>
    <h2 id="dash-title">MoS TEAM — Basari Tablosu</h2>
  </div>
  <div class="hdr-r">
    <div class="upd-box">
      <div class="upd-lbl">Son Guncelleme</div>
      <div class="upd-val" id="last-upd">—</div>
    </div>
    <button class="btn btn-primary" id="refresh-btn" onclick="fetchData(true)">
      <span id="refresh-icon" class="ms">refresh</span> Manuel Guncelle
    </button>
  </div>
</header>

<div class="main">
  <div class="status-bar">
    <div class="sdot loading" id="sdot"></div>
    <span id="status-msg">Veriler yukleniyor...</span>
    <span class="countdown" id="countdown"></span>
  </div>
  <div id="hero-section"></div>
  <div id="legend-section"></div>
  <div id="team-progress-section"></div>
  <div id="teams-section"></div>
  <div id="charts-section"></div>
</div>

<div class="ticker-wrap">
  <div class="ticker" id="ticker-inner">
    <span class="ti tor"><span class="ms">bolt</span>Veriler yukleniyor...</span>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbybanAt2-av_sYFWGKd6gxKoyrOWuHhZ4KlYHiAgy90DELuRkSlfbEgaKtTifqZHahFyA/exec';
const TARGET = 10;
const AUTO_SEC = 60;
let refreshTimer = null;
let countdownTimer = null;

function calcScore(r){
  return Math.round(((r.P3||0)*1.0+(r.P6||0)*1.7+(r.P12||0)*2.5)*100)/100;
}

function calcPrim(puan, isT1, isT2, teamGoalMet){
  if(puan < 6) return 0;
  let baz = 0;
  if     (puan < 7)  baz = 50;
  else if(puan < 8)  baz = 60;
  else if(puan < 9)  baz = 75;
  else if(puan < 10) baz = 85;
  else {
    baz = 100;
    const extra = puan - 10;
    const tamPuan = Math.floor(extra);
    const tam3 = Math.floor(extra / 3);
    baz += tamPuan * 5 + tam3 * 15;
  }
  if(isT1 && puan >= 15){
    baz += 20;
  } else if(teamGoalMet){
    if(isT1)      baz += 20;
    else if(isT2) baz += 10;
  }
  return Math.round(baz);
}

function levelLights(score){
  const dots = [6,7,8,9,10].map(t =>
    `<div class="light${score >= t ? ' on' : ''}"></div>`
  ).join('');
  const reached = [6,7,8,9,10].filter(t => score >= t);
  const lbl = reached.length > 0
    ? `<span class="light-lbl">${reached[reached.length-1]}+</span>`
    : `<span class="light-lbl">—</span>`;
  return `<div class="lights">${dots}${lbl}</div>`;
}

function initials(n){ return (n||'?').trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2); }
function fmt(n,d=1){ return parseFloat(n||0).toFixed(d); }

function statusBadge(score){
  if(score >= TARGET) return '<span class="bdg bg-g">HEDEF TAMAMLANDI</span>';
  if(score >= TARGET * 0.85) return '<span class="bdg bg-y">HEDEFE YAKIN</span>';
  return '<span class="bdg bg-r">DEVAM EDIYOR</span>';
}

function primColor(pct){
  if(pct >= 100) return '#4ade80';
  if(pct >= 75)  return '#a5c893';
  if(pct >= 50)  return '#facc15';
  return '#64748b';
}

function processData(raw){
  const teams = {};
  const allReps = [];

  if(raw.teams && Array.isArray(raw.teams)){
    raw.teams.forEach((team, ti) => {
      const tName = team.name || ('MoS TEAM '+(ti+1));
      const members = (team.members || []).map(rep => ({
        ...rep,
        score: rep.score !== undefined ? rep.score : calcScore(rep),
        teamName: tName
      }));
      members.sort((a,b) => b.score - a.score);

      const toplamPuan = team.toplamPuan !== undefined
        ? team.toplamPuan
        : Math.round(members.reduce((s,r)=>s+r.score,0)*100)/100;
      const hedef = team.hedef || members.length * TARGET;
      const hedefGecildi = team.hedefGecildi !== undefined
        ? team.hedefGecildi
        : toplamPuan >= hedef;

      members.forEach((rep, idx) => {
        if(rep.primPct === undefined){
          rep.primPct = calcPrim(rep.score, idx===0, idx===1, hedefGecildi);
        }
        allReps.push(rep);
      });

      teams[tName] = { toplamPuan, hedef, hedefGecildi, members };
    });
  }

  allReps.sort((a,b) => b.score - a.score);
  return { teams, allReps };
}

function renderHero(allReps){
  const top = allReps[0] || {};
  const pctDone = top.score >= TARGET
    ? '&#10003; TAMAMLANDI'
    : fmt((top.score/TARGET)*100,0)+'%';
  document.getElementById('hero-section').innerHTML = `
    <div class="hero">
      <div class="hero-glow"></div>
      <div class="av-wrap">
        <div class="av-ring">
          ${top.photo
            ? `<img class="av-img" src="${top.photo}" alt="${top.name||''}">`
            : `<div class="av-init">${initials(top.name)}</div>`}
        </div>
        <div class="av-badge">EKİBİN ŞU ANKİ<br>ZİRVE PERFORMANSI</div>
      </div>
      <div class="hero-info">
        <h1>${top.name||'—'}</h1>
        <div class="hero-tags">
          <span class="tag orange">${fmt(top.score)} Toplam Puan</span>
          <span class="tag">#1 Genel Siralama</span>
          <span class="tag">Hedef: ${pctDone}</span>
          ${(top.primPct||0)>0 ? `<span class="tag orange">Prim: %${top.primPct}</span>` : ''}
          ${top.score>=15 ? `<span class="tag orange">&#9733; Zirve Bonusu Aktif</span>` : ''}
        </div>
        <div class="hero-stats">
          <div class="stat-mini"><div class="sl">ProStart-3</div><div class="sv">${top.P3||0}</div></div>
          <div class="stat-mini"><div class="sl">ProStart-6</div><div class="sv">${top.P6||0}</div></div>
          <div class="stat-mini"><div class="sl">ProStart-12</div><div class="sv">${top.P12||0}</div></div>
        </div>
      </div>
      <div class="hero-deco">
        <div class="dt">MoS<br>TEAM</div>
        <div class="ds">KURUMSAL SATIS v4.0</div>
      </div>
    </div>`;
}

function renderLegend(){
  document.getElementById('legend-section').innerHTML = `
    <div class="legend-grid">
      <div class="leg-card"><div class="leg-ico"><span class="ms">stars</span></div><div><div class="leg-lbl">ProStart-3</div><div class="leg-pts">1.0 Puan</div></div></div>
      <div class="leg-card"><div class="leg-ico"><span class="ms">rocket_launch</span></div><div><div class="leg-lbl">ProStart-6</div><div class="leg-pts">1.7 Puan</div></div></div>
      <div class="leg-card"><div class="leg-ico"><span class="ms">workspace_premium</span></div><div><div class="leg-lbl">ProStart-12</div><div class="leg-pts">2.5 Puan</div></div></div>
      <div class="leg-card acc"><div class="leg-ico wh"><span class="ms">target</span></div><div><div class="leg-lbl">Aylik Hedef</div><div class="leg-pts">10 Puan / Kisi</div></div></div>
    </div>`;
}

function renderTeamProgress(teams){
  let html = '<div class="team-progress-section">';
  Object.keys(teams).forEach(tName => {
    const t = teams[tName];
    const pct = t.hedef > 0 ? Math.min(100,(t.toplamPuan/t.hedef)*100) : 0;
    const badge = t.hedefGecildi
      ? '<span class="bdg bg-g">HEDEF ASILDI</span>'
      : '<span class="bdg bg-y">DEVAM EDIYOR</span>';
    html += `
      <div class="team-progress-row">
        <div class="tpr-header">
          <div style="display:flex;align-items:center">
            <span class="tpr-score">${fmt(t.toplamPuan)}</span>
            <div>
              <div class="tpr-name">${tName} &nbsp;${badge}</div>
              <div class="tpr-meta">${t.members.length} uye &nbsp;|&nbsp; Hedef: ${fmt(t.hedef,0)} puan</div>
            </div>
          </div>
          <span style="font-family:monospace;font-size:13px;color:#a5c893;font-weight:700">%${fmt(pct,1)}</span>
        </div>
        <div class="tpr-bar-wrap">
          <div class="tpr-bar-fill" style="width:${fmt(pct,1)}%"></div>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('team-progress-section').innerHTML = html;
}

function renderTeams(teams){
  const names = Object.keys(teams);
  if(!names.length){
    document.getElementById('teams-section').innerHTML =
      '<div style="text-align:center;padding:40px;color:#64748b">Takim verisi bulunamadi.</div>';
    return;
  }
  let html = '<div class="teams-grid">';
  names.forEach(tName => {
    const {members, hedefGecildi} = teams[tName];
    const avg = members.length ? fmt(members.reduce((s,r)=>s+r.score,0)/members.length) : '0.0';
    html += `
      <div class="team-sec">
        <div class="th">
          <div class="team-ac"></div>
          <h3>${tName}</h3>
          <span class="team-avg">Ort: ${avg} ${hedefGecildi?'<span style="color:#4ade80">&#10003;</span>':''}</span>
        </div>
        <div class="tbl-wrap">
          <table>
            <colgroup>
              <col style="width:26%"><col style="width:13%"><col style="width:22%"><col style="width:16%"><col style="width:23%">
            </colgroup>
            <thead><tr>
              <th>Isim</th><th>Puan</th><th>Level</th><th>Prim</th><th style="text-align:right">Durum</th>
            </tr></thead>
            <tbody>
              ${members.map((rep,ri) => {
                const pColor = primColor(rep.primPct||0);
                const isFirst = ri === 0;
                const nameStyle = isFirst ? 'color:#ec5b13' : ri===1 ? 'color:#a5c893' : '';
                return `<tr>
                  <td><div class="nc">
                    <div class="avsm" style="${nameStyle}">${initials(rep.name)}</div>
                    <span class="nm" style="${nameStyle}">${rep.name||'—'}</span>
                  </div></td>
                  <td class="pval">${fmt(rep.score)}</td>
                  <td>${levelLights(rep.score)}</td>
                  <td style="font-weight:700;font-family:monospace;font-size:11px;color:${(rep.primPct||0)>0?pColor:'#64748b'}">
                    ${(rep.primPct||0)>0?'%'+rep.primPct:'—'}
                  </td>
                  <td>${statusBadge(rep.score)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  });
  html += '</div>';
  document.getElementById('teams-section').innerHTML = html;
}

function renderCharts(allReps){
  const p3t  = allReps.reduce((s,r)=>s+(r.P3||0),0);
  const p6t  = allReps.reduce((s,r)=>s+(r.P6||0),0);
  const p12t = allReps.reduce((s,r)=>s+(r.P12||0),0);
  const ptot = p3t+p6t+p12t;
  const p3p  = ptot>0?Math.round(p3t/ptot*100):33;
  const p6p  = ptot>0?Math.round(p6t/ptot*100):33;
  const p12p = ptot>0?Math.round(p12t/ptot*100):34;
  const total   = allReps.reduce((s,r)=>s+r.score,0);
  const target  = allReps.length * TARGET;
  const teamPct = target>0?Math.min(100,(total/target)*100):0;
  const top5    = allReps.slice(0,5);
  const maxS    = top5.length ? top5[0].score : 1;

  document.getElementById('charts-section').innerHTML = `
    <div class="charts-row">
      <div class="ch-card">
        <div class="ch-title">Urun Dagilimi</div>
        <div class="dist-row"><span>ProStart-3</span><span>${p3p}%</span></div>
        <div class="dist-bw"><div class="dist-bf" style="width:${p3p}%;background:#ec5b13"></div></div>
        <div class="dist-row"><span>ProStart-6</span><span>${p6p}%</span></div>
        <div class="dist-bw"><div class="dist-bf" style="width:${p6p}%;background:#a5c893"></div></div>
        <div class="dist-row"><span>ProStart-12</span><span>${p12p}%</span></div>
        <div class="dist-bw"><div class="dist-bf" style="width:${p12p}%;background:#60a5fa"></div></div>
      </div>
      <div class="ch-card">
        <div class="ch-title">Genel Siralama (Top ${top5.length})</div>
        ${top5.map((r,i)=>`
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:11px;font-weight:700;color:${i===0?'#ec5b13':i===1?'#a5c893':'#fff'}">${i+1}. ${r.name||'—'}</span>
            <span style="font-family:monospace;font-size:10px;color:#a5c893">${fmt(r.score)}</span>
          </div>
          <div style="width:100%;background:rgba(255,255,255,.07);height:4px;border-radius:99px;overflow:hidden;margin-bottom:6px">
            <div style="width:${fmt(Math.min(100,(r.score/maxS)*100),1)}%;height:100%;background:${i===0?'#ec5b13':'#304724'};border-radius:99px"></div>
          </div>`).join('')}
      </div>
      <div class="ch-card grn">
        <div class="ch-title">Toplam Ekip Puani</div>
        <div class="tot-num">${fmt(total)}</div>
        <div class="tot-sub">Hedef: ${fmt(target,0)} puan</div>
        <div class="tot-bar"><div class="tot-fill" style="width:${fmt(teamPct,1)}%"></div></div>
        <div style="font-size:10px;color:#a5c893;margin-top:8px">%${fmt(teamPct,1)} tamamlandi</div>
      </div>
    </div>`;
}

function renderTicker(allReps){
  if(!allReps.length) return;
  const top = allReps[0];
  const ranking = allReps.map((r,i)=>`${i+1}. ${r.name||'?'} (${fmt(r.score)})`).join(' | ');
  const total  = allReps.reduce((s,r)=>s+r.score,0);
  const target = allReps.length * TARGET;
  const pct    = target>0?fmt(Math.min(100,(total/target)*100),1):'0.0';
  document.getElementById('ticker-inner').innerHTML = `
    <span class="ti tor"><span class="ms">bolt</span>ZİRVE: ${top.name||'—'} — ${fmt(top.score)} puan | Prim: %${top.primPct||0}${top.score>=15?' | ★ Zirve Bonusu':''}</span>
    <span class="ti"><span class="ms">emoji_events</span>SIRALAMA: ${ranking}</span>
    <span class="ti tgr"><span class="ms">trending_up</span>EKİP TOPLAMI: ${fmt(total)} / ${fmt(target,0)} puan (%${pct})</span>
    <span class="ti tor"><span class="ms">bolt</span>ZİRVE: ${top.name||'—'} — ${fmt(top.score)} puan | Prim: %${top.primPct||0}${top.score>=15?' | ★ Zirve Bonusu':''}</span>
    <span class="ti"><span class="ms">emoji_events</span>SIRALAMA: ${ranking}</span>`;
}

function startCountdown(){
  if(countdownTimer) clearInterval(countdownTimer);
  let val = AUTO_SEC;
  document.getElementById('countdown').textContent = `Sonraki: ${val}s`;
  countdownTimer = setInterval(()=>{
    val--;
    if(val > 0) document.getElementById('countdown').textContent = `Sonraki: ${val}s`;
    else{ document.getElementById('countdown').textContent = 'Guncelleniyor...'; clearInterval(countdownTimer); }
  },1000);
}

async function fetchData(manual=false){
  const btn  = document.getElementById('refresh-btn');
  const sdot = document.getElementById('sdot');
  const smsg = document.getElementById('status-msg');
  btn.disabled = true;
  document.getElementById('refresh-icon').outerHTML = '<span class="spin" id="refresh-icon"></span>';
  sdot.className = 'sdot loading';
  smsg.textContent = 'Veriler guncelleniyor...';
  document.getElementById('countdown').textContent = '';
  if(refreshTimer)   clearInterval(refreshTimer);
  if(countdownTimer) clearInterval(countdownTimer);

  try{
    const opts = manual ? {cache:'no-cache'} : {};
    const res  = await fetch(API + '?t=' + Date.now(), opts);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const raw  = await res.json();

    const {teams, allReps} = processData(raw);
    renderHero(allReps);
    renderLegend();
    renderTeamProgress(teams);
    renderTeams(teams);
    renderCharts(allReps);
    renderTicker(allReps);

    const now = new Date();
    document.getElementById('last-upd').textContent =
      now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR');
    if(raw.title) document.getElementById('dash-title').textContent = raw.title;

    sdot.className = 'sdot';
    smsg.textContent = 'Veriler basariyla guncellendi.';
    startCountdown();
    refreshTimer = setInterval(()=>fetchData(false), AUTO_SEC*1000);

  }catch(e){
    sdot.className = 'sdot error';
    smsg.textContent = 'Veri alinamadi: ' + e.message;
    document.getElementById('countdown').textContent = '';
    refreshTimer = setInterval(()=>fetchData(false), AUTO_SEC*1000);
  }finally{
    const ic = document.getElementById('refresh-icon');
    if(ic) ic.outerHTML = '<span class="ms" id="refresh-icon">refresh</span>';
    btn.disabled = false;
  }
}

fetchData(false);
</script>
</body>
</html>
