<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoS TEAM — Basari Tablosu</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1128;color:#fff;font-family:'Public Sans',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
.ms{font-family:'Material Symbols Outlined',sans-serif;font-size:16px;font-variation-settings:'FILL' 1;display:inline-block;vertical-align:middle;line-height:1}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,17,40,0.97);border-bottom:1px solid #304724;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{color:#ec5b13;width:26px;height:26px;flex-shrink:0}
.logo h2{font-size:14px;font-weight:900;letter-spacing:-0.04em}
.hdr-r{display:flex;align-items:center;gap:10px}
.upd-lbl{font-size:9px;color:#a5c893;text-transform:uppercase;font-weight:700;letter-spacing:0.08em;text-align:right}
.upd-val{font-size:11px;font-family:monospace;text-align:right}
.btn{background:#304724;border:none;color:#fff;padding:7px 13px;border-radius:10px;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;gap:5px;font-family:inherit;transition:background .15s}
.btn:hover{background:#3d5a2d}
.btn:disabled{opacity:.5;cursor:default}
.btn-p{background:#ec5b13!important}
.btn-p:hover{background:#d44f0f!important}
.period-select{background:#1a2a4a;border:1px solid #304724;color:#fff;padding:6px 12px;border-radius:10px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;outline:none}
.period-select:focus{border-color:#ec5b13}
.spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.main{padding:16px 20px 80px;display:flex;flex-direction:column;gap:14px;max-width:1600px;margin:0 auto}
.sbar{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:10px 16px;font-size:11px;color:#a5c893;display:flex;align-items:center;gap:8px}
.sdot{width:8px;height:8px;border-radius:50%;background:#4ade80;flex-shrink:0;transition:background .3s}
.sdot.loading{background:#facc15;animation:pulse 1s infinite}
.sdot.error{background:#f87171}
#countdown{margin-left:auto;font-family:monospace;font-size:10px;color:#64748b}
.hero{background:#111d3a;border:1px solid #304724;border-radius:20px;padding:24px;display:flex;gap:24px;align-items:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:0;right:0;width:50%;height:100%;background:radial-gradient(circle at 70% 50%,rgba(236,91,19,.1) 0%,transparent 70%);pointer-events:none}
.av-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:1}
.av-ring{width:100px;height:100px;border-radius:50%;border:3px solid #ec5b13;padding:3px;overflow:hidden;flex-shrink:0}
.av-ring img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block}
.av-init{width:100%;height:100%;border-radius:50%;background:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:900;color:#ec5b13}
.av-badge{background:#ec5b13;color:#fff;font-size:8px;font-weight:700;padding:4px 12px;border-radius:20px;white-space:nowrap;text-align:center;line-height:1.5;letter-spacing:.02em}
.hero-info{flex:1;position:relative;z-index:1}
.hero-info h1{font-size:26px;font-weight:900;letter-spacing:-0.04em;margin-bottom:8px}
.hero-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.tag{background:#304724;color:#a5c893;font-size:9px;font-weight:700;padding:3px 10px;border-radius:20px}
.tag.or{background:rgba(236,91,19,.2);color:#ec5b13}
.hstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px}
.sm{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px}
.sm .sl{font-size:9px;color:#94a3b8;margin-bottom:3px}
.sm .sv{font-size:20px;font-weight:900}
.hero-deco{opacity:.18;text-align:right;flex-shrink:0;position:relative;z-index:1}
.hero-deco .dt{font-size:40px;font-weight:900;color:#ec5b13;font-style:italic;line-height:1}
.hero-deco .ds{font-size:9px;color:#a5c893;font-weight:700;letter-spacing:.1em;margin-top:4px}
.lgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lcard{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.lcard.acc{background:#304724;border-color:#ec5b13}
.lico{background:rgba(236,91,19,.2);color:#ec5b13;padding:8px;border-radius:8px;display:flex}
.lico.wh{background:rgba(255,255,255,.2)}
.llbl{font-size:10px;color:#94a3b8}
.lcard.acc .llbl{color:#a5c893}
.lpts{font-size:13px;font-weight:700}
.tpsec{display:flex;flex-direction:column;gap:8px}
.tprow{background:#1a2a4a;border:1px solid #304724;border-radius:12px;padding:12px 16px}
.tphdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tpscore{font-size:24px;font-weight:900;color:#ec5b13;font-family:monospace;margin-right:12px;flex-shrink:0;line-height:1}
.tpname{font-size:13px;font-weight:900}
.tpmeta{font-size:10px;color:#a5c893;margin-top:2px}
.tpbw{width:100%;background:rgba(255,255,255,.07);height:8px;border-radius:99px;overflow:hidden}
.tpbf{height:100%;background:#ec5b13;border-radius:99px;transition:width .6s ease}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.tsec .th{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.tac{width:4px;height:28px;background:#ec5b13;border-radius:2px;flex-shrink:0}
.tsec h3{font-size:16px;font-weight:900;margin:0}
.tavg{font-family:monospace;font-size:11px;color:#a5c893;margin-left:auto}
.twrap{border:1px solid #304724;border-radius:14px;overflow:hidden;background:rgba(26,42,74,.4)}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead tr{background:rgba(48,71,36,.5)}
th{padding:9px 10px;font-size:8px;text-transform:uppercase;letter-spacing:.08em;color:#a5c893;font-weight:700;text-align:left}
th:last-child{text-align:right}
td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.05);vertical-align:middle}
td:last-child{text-align:right}
.nc{display:flex;align-items:center;gap:8px}
.nm{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pval{font-family:monospace;font-size:13px;font-weight:900}
.bdg{font-size:8px;font-weight:700;padding:3px 7px;border-radius:20px;white-space:nowrap}
.bg-g{background:rgba(34,197,94,.2);color:#4ade80}
.bg-y{background:rgba(234,179,8,.2);color:#facc15}
.bg-r{background:rgba(239,68,68,.2);color:#f87171}
.lights{display:flex;gap:3px;align-items:center}
.lt{width:12px;height:12px;border-radius:50%;background:#1e293b;border:1px solid rgba(255,255,255,.1);flex-shrink:0;transition:all .3s}
.lt.on{background:#ec5b13;border-color:#ec5b13;box-shadow:0 0 6px rgba(236,91,19,.85)}
.lt-lbl{font-size:8px;color:#64748b;margin-left:4px;font-family:monospace;min-width:20px}
.crow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.cc{background:#111d3a;border:1px solid #304724;border-radius:14px;padding:16px}
.cc.grn{background:linear-gradient(135deg,#304724 0%,#1a2a4a 100%);border-color:#ec5b13;text-align:center;display:flex;flex-direction:column;justify-content:center}
.ctit{font-size:9px;color:#a5c893;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.drow{display:flex;justify-content:space-between;font-size:10px;font-weight:700;margin-bottom:4px}
.dbw{width:100%;background:rgba(255,255,255,.06);height:6px;border-radius:99px;overflow:hidden;margin-bottom:8px}
.dbf{height:100%;border-radius:99px}
.tnum{font-size:42px;font-weight:900;line-height:1}
.tsub{font-size:11px;color:#a5c893;margin-top:6px}
.tbar{background:rgba(0,0,0,.3);border-radius:99px;height:6px;margin-top:12px;overflow:hidden}
.tbf{height:100%;background:#fff;border-radius:99px;transition:width .6s ease}
/* ── CONFETTI ── */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:998;overflow:hidden}
.cp{position:absolute;top:-12px;opacity:0;animation:cffall linear forwards}
@keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(105vh) rotate(720deg) scale(.5)}}
/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#111d3a;border:1px solid #304724;border-radius:20px;padding:28px;min-width:320px;max-width:440px;width:90%;position:relative}
.modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-close:hover{color:#fff}
.modal-head{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.modal-av{width:56px;height:56px;border-radius:50%;border:2px solid #ec5b13;overflow:hidden;flex-shrink:0}
.modal-av img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%}
.modal-av-init{width:100%;height:100%;border-radius:50%;background:#1a2a4a;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#ec5b13}
.modal-name{font-size:18px;font-weight:900;letter-spacing:-0.03em}
.modal-sub{font-size:10px;color:#a5c893;margin-top:2px}
.modal-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.mc{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;text-align:center}
.mc-lbl{font-size:9px;color:#94a3b8;margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.mc-val{font-size:28px;font-weight:900;line-height:1}
.mc-pts{font-size:9px;color:#64748b;margin-top:3px}
.modal-score{background:rgba(236,91,19,.1);border:1px solid rgba(236,91,19,.3);border-radius:12px;padding:14px;display:flex;align-items:center;justify-content:space-between}
.modal-score-lbl{font-size:10px;color:#a5c893;font-weight:700}
.modal-score-val{font-size:28px;font-weight:900;color:#ec5b13;font-family:monospace}
.modal-prim{font-size:11px;color:#4ade80;font-weight:700}
/* ── TICKER ── */
.tkwrap{position:fixed;bottom:0;left:0;width:100%;height:46px;background:rgba(10,17,40,.98);border-top:1px solid #304724;overflow:hidden;display:flex;align-items:center;z-index:100}
.tk-track{display:flex;align-items:center;white-space:nowrap;animation:tick 50s linear infinite}
.tk-copy{display:inline-flex;align-items:center;font-size:11px;font-weight:700;flex-shrink:0}
.tk-sep{display:inline-flex;align-items:center;gap:6px;padding:0 28px;color:#f59e0b;flex-shrink:0;user-select:none;font-family:'Material Symbols Outlined',sans-serif;font-size:18px;font-variation-settings:'FILL' 1;line-height:1}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ti{display:inline-flex;align-items:center;gap:6px;margin-right:48px}
.tor{color:#ec5b13}
.tgr{color:#a5c893}
/* ── ROW CLICKABLE ── */
tr.clickable{cursor:pointer}
tr.clickable:hover td{background:rgba(236,91,19,.06)}
@media(max-width:960px){.tgrid{grid-template-columns:1fr}.crow{grid-template-columns:1fr}.lgrid{grid-template-columns:repeat(2,1fr)}.hero{flex-direction:column;text-align:center}.hero-tags{justify-content:center}.hstats{margin:0 auto}.hero-deco{display:none}}
@media(max-width:500px){.main{padding:12px 12px 80px}.hero-info h1{font-size:20px}.lgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none"><path d="M24 4C25.78 14.22 33.78 22.22 44 24C33.78 25.78 25.78 33.78 24 44C22.22 33.78 14.22 25.78 4 24C14.22 22.18 22.22 14.22 24 4Z" fill="currentColor"/></svg>
    <h2 id="dash-title">MoS Team</h2>
    <div style="width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 2px;flex-shrink:0"></div>
    <select class="period-select" id="period-select" onchange="onPeriodChange()">
      <option value="">Yukleniyor...</option>
    </select>
  </div>
  <div class="hdr-r">
    <div>
      <div class="upd-lbl">Son Guncelleme</div>
      <div class="upd-val" id="last-upd">—</div>
    </div>
    <button class="btn btn-p" id="rbtn" onclick="fetchData(true)">
      <span id="rico" class="ms">refresh</span> Guncelle
    </button>
  </div>
</header>

<div class="main">
  <div class="sbar">
    <div class="sdot loading" id="sdot"></div>
    <span id="smsg">Veriler yukleniyor...</span>
    <span id="countdown"></span>
  </div>
  <div id="s-hero"></div>
  <div id="s-legend"></div>
  <div id="s-progress"></div>
  <div id="s-teams"></div>
  <div id="s-charts"></div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal(null,'force')">&#10005;</button>
    <div class="modal-head">
      <div class="modal-av" id="m-av"></div>
      <div>
        <div class="modal-name" id="m-name">—</div>
        <div class="modal-sub" id="m-sub">—</div>
      </div>
    </div>
    <div class="modal-cards">
      <div class="mc">
        <div class="mc-lbl">ProStart-3</div>
        <div class="mc-val" id="m-p3">0</div>
        <div class="mc-pts">× 1.0 puan</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">ProStart-6</div>
        <div class="mc-val" id="m-p6">0</div>
        <div class="mc-pts">× 1.7 puan</div>
      </div>
      <div class="mc">
        <div class="mc-lbl">ProStart-12</div>
        <div class="mc-val" id="m-p12">0</div>
        <div class="mc-pts">× 2.5 puan</div>
      </div>
    </div>
    <div class="modal-score">
      <div>
        <div class="modal-score-lbl">TOPLAM PUAN</div>
        <div class="modal-score-val" id="m-score">0.0</div>
      </div>
      <div style="text-align:right">
        <div class="modal-score-lbl">PRİM</div>
        <div class="modal-prim" id="m-prim">—</div>
      </div>
    </div>
  </div>
</div>

<div class="tkwrap">
  <div class="tk-track" id="tk-track">
    <div class="tk-copy" id="tk-a"><span class="ti tor"><span class="ms">bolt</span>Veriler yukleniyor...</span></div>
    <div class="tk-sep">emoji_events emoji_events emoji_events</div>
    <div class="tk-copy" id="tk-b"><span class="ti tor"><span class="ms">bolt</span>Veriler yukleniyor...</span></div>
    <div class="tk-sep">emoji_events emoji_events emoji_events</div>
  </div>
</div>

<script>
const API      = 'https://mos-proxy.efeburhan79.workers.dev/';
const TGT      = 10;
const AUTO_SEC = 60;
let rTimer = null, cTimer = null;
let rawCache = null;
let currentPeriod = '';

/* ── INİTİALS: sadece İsim + Soyisim baş harfi ── */
function ini2(name){
  const parts = (name||'?').trim().split(/\s+/);
  if(parts.length >= 2) return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
  return parts[0].slice(0,2).toUpperCase();
}

function calcScore(r){
  return Math.round(((r.P3||0)*1+(r.P6||0)*1.7+(r.P12||0)*2.5)*100)/100;
}

function calcPrim(puan, toplamSatis, is1, is2, teamOK){
  let efektif = 0;
  if      (puan >= 10 && toplamSatis >= 6) efektif = puan;
  else if (puan >= 9  && toplamSatis >= 5) efektif = Math.min(puan, 9.99);
  else if (puan >= 8  && toplamSatis >= 5) efektif = Math.min(puan, 8.99);
  else if (puan >= 7  && toplamSatis >= 4) efektif = Math.min(puan, 7.99);
  else if (puan >= 6  && toplamSatis >= 4) efektif = Math.min(puan, 6.99);
  else return 0; // Kota karşılanmadı — prim yok, bonus yok

  let b = efektif<7?50:efektif<8?60:efektif<9?75:efektif<10?85:100;
  if(efektif >= 10){
    const ex = puan - 10;
    b += Math.floor(ex)*5 + Math.floor(ex/3)*15;
  }
  // Ekip bonusu: sadece 15+ puan VEYA ekip hedefi geçildiyse
  if(is1 && puan >= 15) b += 20;
  else if(teamOK){ if(is1) b+=20; else if(is2) b+=10; }
  return Math.round(b);
}

function levelLights(s){
  const dots = [6,7,8,9,10].map(t=>`<div class="lt${s>=t?' on':''}"></div>`).join('');
  const last = [6,7,8,9,10].filter(t=>s>=t);
  const lbl  = last.length ? last[last.length-1]+'+' : '—';
  return `<div class="lights">${dots}<span class="lt-lbl">${lbl}</span></div>`;
}

function heroAvatar(photo, name){
  const i2 = ini2(name);
  if(photo && photo.trim()){
    return `<img src="${photo.trim()}" alt="${name||''}"
      style="width:94px;height:94px;border-radius:50%;object-fit:cover;display:block"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <div style="display:none;width:94px;height:94px;border-radius:50%;background:#1a2a4a;
      align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#ec5b13">${i2}</div>`;
  }
  return `<div style="width:94px;height:94px;border-radius:50%;background:#1a2a4a;display:flex;
    align-items:center;justify-content:center;font-size:28px;font-weight:900;color:#ec5b13">${i2}</div>`;
}

function rowAvatar(photo, name, col){
  const i2  = ini2(name);
  const bdr = col || '#304724';
  const tc  = col || '#fff';
  if(photo && photo.trim()){
    return `<img src="${photo.trim()}" alt="${name||''}"
      style="width:30px;height:30px;border-radius:50%;object-fit:cover;display:block;border:2px solid ${bdr};flex-shrink:0"
      onerror="this.style.display='none';this.nextSibling.style.display='flex'">
    <div style="display:none;width:30px;height:30px;border-radius:50%;background:#334155;
      align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${tc};flex-shrink:0">${i2}</div>`;
  }
  return `<div style="width:30px;height:30px;border-radius:50%;background:#334155;flex-shrink:0;display:flex;
    align-items:center;justify-content:center;font-size:10px;font-weight:700;color:${tc}">${i2}</div>`;
}

function fmt(n,d=1){ return parseFloat(n||0).toFixed(d); }

function statusBadge(score, toplamSatis, hedef){
  const h = (hedef !== null && hedef !== undefined) ? hedef : TGT;
  const puanTamam = score >= h && h > 0;
  const kotaTamam = toplamSatis >= 6;

  if(puanTamam && kotaTamam)  return '<span class="bdg bg-g">🏆 HEDEFİ AŞTI</span>';
  if(puanTamam && !kotaTamam) return '<span class="bdg bg-y">⚡ PUAN TAMAM, SATIŞA DEVAM</span>';
  if(!puanTamam && kotaTamam) return '<span class="bdg bg-y">📈 HEDEFE YAKLAŞIYOR</span>';
  return '<span class="bdg bg-r">🚀 HEDEFE KOŞUYOR</span>';
}
function primColor(p){ return p>=100?'#4ade80':p>=75?'#a5c893':p>=50?'#facc15':'#64748b'; }

/* ── DÖNEM FİLTRELEME ── */
function extractPeriods(raw){
  const periods = new Set();
  if(raw.tumSatislar && Array.isArray(raw.tumSatislar)){
    raw.tumSatislar.forEach(s=>{ if(s.donem) periods.add(String(s.donem).trim()); });
  } else if(raw.periods && Array.isArray(raw.periods)){
    raw.periods.forEach(p=>periods.add(p));
  }
  return Array.from(periods).sort();
}

function buildPeriodsFromTeams(raw){
  // Fallback: eğer API doğrudan dönem listesi vermiyorsa teams içinden çıkar
  const periods = new Set();
  if(raw.teams) raw.teams.forEach(t=>(t.members||[]).forEach(m=>{
    if(m.donem) periods.add(String(m.donem).trim());
  }));
  return Array.from(periods).sort();
}

function updatePeriodDropdown(periods){
  const sel = document.getElementById('period-select');
  const cur = sel.value;
  sel.innerHTML = '';
  periods.forEach(p=>{
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    sel.appendChild(o);
  });
  if(periods.includes(cur)) sel.value = cur;
  else if(periods.length) sel.value = periods[periods.length-1]; // en son dönem varsayılan
  currentPeriod = sel.value;
}

function filterByPeriod(raw, period){
  if(!period) return raw;
  // API dönem filtresini destekliyorsa zaten filtrelenmiş gelir
  // Desteklemiyorsa client-side filtrele
  if(!raw.tumSatislar) return raw;

  const salesFiltered = raw.tumSatislar.filter(s=>String(s.donem||'').trim()===period);

  // personelMap'ten satış sayılarını yeniden hesapla
  const satisMap = {};
  salesFiltered.forEach(s=>{
    const ad = String(s.personel||'').trim();
    if(!ad) return;
    if(!satisMap[ad]) satisMap[ad]={P3:0,P6:0,P12:0};
    const tip = String(s.paketTipi||'').trim();
    if(tip==='ProStart-3')  satisMap[ad].P3++;
    if(tip==='ProStart-6')  satisMap[ad].P6++;
    if(tip==='ProStart-12') satisMap[ad].P12++;
  });

  // teams'i güncelle
  const newTeams = (raw.teams||[]).map(team=>{
    const newMembers = (team.members||[]).map(m=>{
      const s = satisMap[m.name]||{P3:0,P6:0,P12:0};
      const score = calcScore(s);
      const toplamSatis = s.P3 + s.P6 + s.P12;
      return {...m, P3:s.P3, P6:s.P6, P12:s.P12, score, toplamSatis, primPct:undefined};
    });
    const newToplamPuan = Math.round(newMembers.reduce((s,r)=>s+r.score,0)*100)/100;
    const newHedef = newMembers.reduce((s,r)=>s+(r.hedef!==null && r.hedef!==undefined ? r.hedef : 0),0);
    return {
      ...team,
      members: newMembers,
      toplamPuan: newToplamPuan,
      hedef: newHedef,
      hedefGecildi: newToplamPuan >= newHedef
    };
  });

  return {...raw, teams: newTeams};
}

function processData(raw){
  const teams={}, all=[];
  if(!raw.teams||!Array.isArray(raw.teams)) return {teams,all};

  raw.teams.forEach((t,ti)=>{
    const nm = t.name||('MoS TEAM '+(ti+1));
    const members = (t.members||[]).map(r=>({
      ...r,
      score: r.score!==undefined ? r.score : calcScore(r),
      teamName: nm,
      photo: r.photo||''
    }));

    const total  = Math.round(members.reduce((s,r)=>s+r.score,0)*100)/100;
    const hedef  = (t.hedef !== null && t.hedef !== undefined) ? t.hedef : members.reduce((s,r)=>s+(r.hedef||0),0);
    const teamOK = total >= hedef;

    // Önce score'a göre sırala (ekip 1. ve 2.'sini belirlemek için)
    members.sort((a,b)=>b.score-a.score);

    members.forEach((r,i)=>{
      if(r.primPct===undefined){
        const ts = (r.toplamSatis !== undefined) ? r.toplamSatis : (r.P3||0)+(r.P6||0)+(r.P12||0);
        r.primPct = calcPrim(r.score, ts, i===0, i===1, teamOK);
      }
      all.push(r);
    });

    // primPct hesaplandıktan sonra prime göre sırala
    members.sort((a,b)=>(b.primPct||0)-(a.primPct||0) || b.score-a.score);

    teams[nm] = {total, hedef, teamOK, members};
  });

  all.sort((a,b)=>(b.primPct||0)-(a.primPct||0) || b.score-a.score);
  return {teams, all};
}

function launchConfetti(){
  const colors=['#ec5b13','#f59e0b','#4ade80','#60a5fa','#a78bfa','#f472b6','#fff'];
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.body.appendChild(wrap);
  for(let i=0;i<120;i++){
    const p = document.createElement('div');
    p.className = 'cp';
    const size = 6+Math.random()*8;
    const isRect = Math.random()>0.5;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px;
      height:${isRect?size*0.4:size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${isRect?'2px':'50%'};
      animation-duration:${2+Math.random()*3}s;
      animation-delay:${Math.random()*2}s;
    `;
    wrap.appendChild(p);
  }
  setTimeout(()=>wrap.remove(), 6000);
}

function renderDashboard(raw, period){
  const filtered = filterByPeriod(raw, period);
  const {teams, all} = processData(filtered);
  currentAll = all;
  renderHero(all, teams);
  renderLegend();
  renderProgress(teams);
  renderTeams(teams);
  renderCharts(all, teams);
  renderTicker(all);
}

function onPeriodChange(){
  currentPeriod = document.getElementById('period-select').value;
  document.getElementById('dash-title').textContent = 'MoS Team — ' + currentPeriod;
  if(rawCache) renderDashboard(rawCache, currentPeriod);
}

function startCountdown(){
  if(cTimer) clearInterval(cTimer);
  let v = AUTO_SEC;
  document.getElementById('countdown').textContent = `Sonraki: ${v}s`;
  cTimer = setInterval(()=>{
    v--;
    if(v>0) document.getElementById('countdown').textContent = `Sonraki: ${v}s`;
    else { document.getElementById('countdown').textContent='Guncelleniyor...'; clearInterval(cTimer); }
  }, 1000);
}

async function fetchData(manual=false){
  const btn = document.getElementById('rbtn');
  btn.disabled = true;
  document.getElementById('rico').outerHTML = '<span class="spin" id="rico"></span>';
  document.getElementById('sdot').className = 'sdot loading';
  document.getElementById('smsg').textContent = 'Veriler guncelleniyor...';
  document.getElementById('countdown').textContent = '';
  if(rTimer) clearInterval(rTimer);
  if(cTimer) clearInterval(cTimer);

  try {
    const opts = manual ? {cache:'no-cache'} : {};
    const res  = await fetch(API + '?t=' + Date.now(), opts);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const raw  = await res.json();
    rawCache   = raw;

    let periods = raw.periods || [];
    if(!periods.length) periods = extractPeriods(raw);
    if(!periods.length) periods = buildPeriodsFromTeams(raw);
    if(!periods.length){ periods = ['Guncel']; raw.tumSatislar = null; }

    updatePeriodDropdown(periods);
    currentPeriod = document.getElementById('period-select').value;
    document.getElementById('dash-title').textContent = 'MoS Team — ' + currentPeriod;

    renderDashboard(raw, currentPeriod);

    const now = new Date();
    document.getElementById('last-upd').textContent =
      now.toLocaleDateString('tr-TR') + ' ' + now.toLocaleTimeString('tr-TR');

    document.getElementById('sdot').className = 'sdot';
    document.getElementById('smsg').textContent = 'Veriler basariyla guncellendi.';
    startCountdown();
    rTimer = setInterval(()=>fetchData(false), AUTO_SEC*1000);

  } catch(e) {
    document.getElementById('sdot').className = 'sdot error';
    document.getElementById('smsg').textContent = 'Veri alinamadi: ' + e.message;
    rTimer = setInterval(()=>fetchData(false), AUTO_SEC*1000);
  } finally {
    const ic = document.getElementById('rico');
    if(ic) ic.outerHTML = '<span class="ms" id="rico">refresh</span>';
    btn.disabled = false;
  }
}

fetchData(false);
